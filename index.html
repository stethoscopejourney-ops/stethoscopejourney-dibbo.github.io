<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stethoscope Journey - Student Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6; /* gray-100 */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Brand Header -->
    <div class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-bold text-teal-900 mb-2">Stethoscope Journey</h1>
        <p class="text-xl md:text-2xl text-teal-700 font-medium">Student Portal</p>
    </div>

    <!-- Main Content: Big Centered Card -->
    <main class="w-full max-w-lg">
        <div class="bg-white rounded-2xl shadow-xl border border-gray-200 p-10 md:p-12">
            
            <!-- List Content -->
            <div class="space-y-6 text-xl md:text-2xl text-gray-800">
                
                <div class="flex flex-col md:flex-row md:items-baseline border-b border-gray-100 pb-4">
                    <span class="font-bold text-teal-800 w-48 shrink-0">Name:</span>
                    <span class="text-gray-700">Internal Medicine</span>
                </div>

                <div class="flex flex-col md:flex-row md:items-baseline border-b border-gray-100 pb-4">
                    <span class="font-bold text-teal-800 w-48 shrink-0">S.N:</span>
                    <span class="text-gray-700">1</span>
                </div>

                <div class="flex flex-col md:flex-row md:items-baseline border-b border-gray-100 pb-4">
                    <span class="font-bold text-teal-800 w-48 shrink-0">Total Class:</span>
                    <span class="text-gray-700">12</span>
                </div>

                <div class="flex flex-col md:flex-row md:items-baseline pb-4">
                    <span class="font-bold text-teal-800 w-48 shrink-0">Running Class:</span>
                    <span class="text-gray-700">1</span>
                </div>

            </div>

            <!-- Action Links -->
            <div class="mt-10 flex flex-col gap-4">
                
                <a href="#" class="block w-full bg-teal-600 hover:bg-teal-700 text-white text-center font-bold text-xl py-4 rounded-xl transition-colors shadow-md">
                    Live Exam
                </a>

                <a href="https://youtube.com/" class="block w-full bg-white border-2 border-teal-600 hover:bg-teal-50 text-teal-700 text-center font-bold text-xl py-4 rounded-xl transition-colors shadow-sm">
                    Live Class
                </a>

            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-8 text-gray-400 text-sm">
        &copy; Stethoscope Journey
    </footer>

</body>
</html>
